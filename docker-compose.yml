version: '3.8'

services:
  voixify-backend:
    build: ./backend
    container_name: voixify-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - WHISPER_URL=${WHISPER_URL:-http://host.docker.internal:8000}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-kimi-k2.5:cloud}
      - BACKEND_PORT=3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - voixify-net

networks:
  voixify-net:
    driver: bridge
